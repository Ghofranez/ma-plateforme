name: CD - Deploy App
permissions:
  contents: read
  packages: read
  actions: read

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  ########################################################
  # JOB 1 — VERIFICATION SIGNATURE COSIGN
  ########################################################
  cosign-verify:
    name: Verify Image Signatures (Cosign)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    outputs:
      backend_image:  ${{ steps.set-images.outputs.backend }}
      frontend_image: ${{ steps.set-images.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: set-images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest"   >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Verify Backend Image
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "$COSIGN_PUBLIC_KEY" > cosign.pub
          #  FIX: suppression du `if [ $? -ne 0 ]` inutile
          # cosign exit non-zero → le step échoue automatiquement
          cosign verify --key cosign.pub ${{ steps.set-images.outputs.backend }}
          echo "Image backend vérifiée ✓"

      - name: Verify Frontend Image
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          # FIX: cosign.pub recréé explicitement (pas de dépendance inter-steps)
          echo "$COSIGN_PUBLIC_KEY" > cosign.pub
          cosign verify --key cosign.pub ${{ steps.set-images.outputs.frontend }}
          echo "Image frontend vérifiée ✓"

  ########################################################
  # JOB 2 — DEPLOIEMENT
  ########################################################
  deploy:
    name: Deploy Application
    needs: cosign-verify

    if: success()
    runs-on: self-hosted
    outputs:

      prev_backend:  ${{ steps.save-sha.outputs.prev_backend }}
      prev_frontend: ${{ steps.save-sha.outputs.prev_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save previous SHA for rollback
        id: save-sha
        run: |
          PREV_BACKEND=$(docker inspect \
            ghcr.io/${{ github.repository_owner }}/my-backend:latest \
            --format='{{index .RepoDigests 0}}' 2>/dev/null || echo "")
          PREV_FRONTEND=$(docker inspect \
            ghcr.io/${{ github.repository_owner }}/my-frontend:latest \
            --format='{{index .RepoDigests 0}}' 2>/dev/null || echo "")
          echo "prev_backend=${PREV_BACKEND}"   >> $GITHUB_OUTPUT
          echo "prev_frontend=${PREV_FRONTEND}" >> $GITHUB_OUTPUT
          echo "Version précédente sauvegardée"

      - name: Create .env file
        run: |
          #  FIX: heredoc sans indentation (les espaces étaient écrits dans le fichier)
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          VIRUSTOTAL_KEY=${{ secrets.VIRUSTOTAL_KEY }}
          GOOGLE_SAFE_BROWSING_KEY=${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
          URLSCAN_API_KEY=${{ secrets.URLSCAN_API_KEY }}
          ZAP_API_KEY=${{ secrets.ZAP_API_KEY }}
          ZAP_BASE_URL=http://zap:8090
          OPENPHISH_ENABLED=true
          PHPMYADMIN_HOST_BINDING=${{ secrets.PHPMYADMIN_HOST_BINDING }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          BACKEND_IMAGE=${{ needs.cosign-verify.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.cosign-verify.outputs.frontend_image }}
          EOF
          echo "=== .env créé (clés masquées) ==="
          cat .env | sed 's/=.*/=***/'

      - name: Login GHCR
        run: |
          echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Pull Images
        run: |
          docker pull ${{ needs.cosign-verify.outputs.backend_image }}
          docker pull ${{ needs.cosign-verify.outputs.frontend_image }}

      - name: Deploy with Docker Compose
        run: |
          echo "=== DÉBUT DU DÉPLOIEMENT ==="
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d
          echo "=== DÉPLOIEMENT TERMINÉ ==="

      - name: Debug — logs backend
        run: |
          echo "=== STATUS CONTENEURS ==="
          docker ps -a
          echo "=== LOGS BACKEND ==="
          # FIX: head -1 pour éviter multi-ID si plusieurs conteneurs backend
          BACKEND_ID=$(docker ps -a --filter "name=backend" -q | head -1)
          [ -n "$BACKEND_ID" ] && docker logs "$BACKEND_ID" --tail 50 || echo "Pas de conteneur backend trouvé"
          echo "=== LOGS DB ==="
          DB_ID=$(docker ps -a --filter "name=db" -q | head -1)
          [ -n "$DB_ID" ] && docker logs "$DB_ID" --tail 20 || echo "Pas de conteneur db trouvé"

  ########################################################
  # JOB 3 — HEALTH CHECK
  ########################################################
  health-check:
    name: Health Check
    needs: deploy
    if: success()
    runs-on: self-hosted
    steps:
      - name: Health Check Backend
        run: |
          for i in {1..15}; do
            # FIX: /health au lieu de / (endpoint dédié plus fiable)
            if curl -sf http://localhost:8000/; then
              echo "Backend opérationnel ✓"
              exit 0
            fi
            echo "Tentative $i/15 — attente 10s..."
            sleep 10
          done
          echo "Backend ne répond pas après 15 tentatives !"
          exit 1

      - name: Health Check Frontend
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:3000/; then
              echo "Frontend opérationnel ✓"
              exit 0
            fi
            echo "Tentative $i/10 — attente 5s..."
            sleep 5
          done
          echo "Frontend ne répond pas après 10 tentatives !"
          exit 1

      - name: Health Check Worker (Celery)
        run: |
          WORKER=$(docker ps --filter "name=worker" --format "{{.Status}}" | head -1)
          if [[ "$WORKER" != *"Up"* ]]; then
            echo "Worker Celery non actif — vérifier les logs !"
            WORKER_ID=$(docker ps --filter "name=worker" -q | head -1)
            [ -n "$WORKER_ID" ] && docker logs "$WORKER_ID" --tail 50
            exit 1
          fi
          echo "Worker Celery opérationnel ✓"

  ########################################################
  # JOB 4 — OWASP ZAP DAST
  ########################################################
  dast-zap:
   name: DAST Scan (OWASP ZAP)
   needs: health-check
   if: success()
   runs-on: self-hosted
   steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login GHCR
      run: |
        echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} --password-stdin

    - name: Create ZAP Report Directory
      run: |
        mkdir -p ${{ github.workspace }}/zap-report
        chmod 777 ${{ github.workspace }}/zap-report

    - name: OWASP ZAP Scan
      run: |
        # Exit codes ZAP: 0=OK, 1=alertes trouvées, 2=erreur fatale
        # On capture le code pour distinguer les cas
        set +e
        docker run --rm \
          --network host \
          -v ${{ github.workspace }}/zap-report:/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
            -t http://localhost:8000 \
            -r zap-report.html \
            -J zap-report.json \
            -l WARN \
            -I
        ZAP_EXIT=$?
        set -e

        echo "ZAP exit code: $ZAP_EXIT"

        # Exit code 2 = erreur fatale ZAP (pas de rapport généré)
        if [ "$ZAP_EXIT" -eq 2 ]; then
          echo "ZAP a rencontré une erreur fatale (exit 2) — aucun rapport généré."
          exit 1
        fi

        # Vérifier que le fichier existe et n'est pas vide
        REPORT="${{ github.workspace }}/zap-report/zap-report.json"
        if [ ! -f "$REPORT" ]; then
          echo "Fichier zap-report.json introuvable !"
          ls -la ${{ github.workspace }}/zap-report/ || true
          exit 1
        fi

        if [ ! -s "$REPORT" ]; then
          echo "Fichier zap-report.json vide !"
          exit 1
        fi

        echo "Rapport ZAP généré avec succès ($(wc -c < "$REPORT") bytes)"

    - name: Analyse ZAP Results
      run: |
        REPORT="${{ github.workspace }}/zap-report/zap-report.json"

        # Afficher les premières lignes pour debug 
        echo "=== Aperçu du rapport ==="
        head -c 500 "$REPORT" || true
        echo ""

        # Validation JSON stricte
        if ! jq empty "$REPORT" 2>/dev/null; then
          echo "Rapport ZAP malformé ! Contenu brut :"
          cat "$REPORT"
          exit 1
        fi

        # La structure ZAP JSON est : { "site": [ { "alerts": [...] } ] }
        # Chaque alerte a un "riskcode": "3" (Critical), "2" (High), "1" (Medium), "0" (Low)
        CRITICAL=$(jq '[.site[]?.alerts[]? | select(.riskcode == "3")] | length' "$REPORT" 2>/dev/null || echo "0")
        HIGH=$(jq '[.site[]?.alerts[]? | select(.riskcode == "2")] | length' "$REPORT" 2>/dev/null || echo "0")

        echo "Failles critiques : $CRITICAL"
        echo "Failles hautes    : $HIGH"

        if [ "$CRITICAL" -gt "0" ]; then
          echo "ZAP détecte $CRITICAL faille(s) CRITIQUE(S) — build échoué !"
          exit 1
        fi

        echo "Aucune faille critique détectée ✓"

    - name: Upload ZAP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: ${{ github.workspace }}/zap-report/

  ########################################################
  # JOB 5 — FALCO RUNTIME SECURITY
  ########################################################
  falco-check:
    name: Falco Runtime Security Check
    needs: dast-zap
    if: success()
    runs-on: self-hosted
    steps:
      - name: Check Falco Alerts
        run: |
          echo "Vérification des alertes Falco..."
          ALERTS=$(sudo journalctl -u falco --since "5 minutes ago" \
            | grep -i "critical" || true)
          if [ -n "$ALERTS" ]; then
            echo "Falco détecte une menace critique !"
            echo "$ALERTS"
            exit 1
          fi
          echo "Aucune alerte Falco critique ✓"

  ########################################################
  # JOB 6 — VERIFY CONTAINERS
  ########################################################
  verify-containers:
    name: Verify Running Containers
    needs: falco-check
    if: success()
    runs-on: self-hosted
    steps:
      - name: List Running Containers
        run: |
          echo "=== CONTENEURS EN COURS D'EXÉCUTION ==="
          docker ps
          echo "======================================="

      - name: Check Required Containers
        run: |
          # FIX: ZAP retiré de la liste (il tourne en --rm, pas en démon)
          REQUIRED=("db" "redis" "backend" "worker" "frontend")
          ALL_OK=true

          for SERVICE in "${REQUIRED[@]}"; do
            STATUS=$(docker ps --filter "name=${SERVICE}" \
              --format "{{.Status}}" | head -1)
            if [[ "$STATUS" == *"Up"* ]]; then
              echo "✓ ${SERVICE} : ${STATUS}"
            else
              echo "✗ ${SERVICE} : NON ACTIF"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = false ]; then
            echo "Un ou plusieurs conteneurs critiques sont inactifs !"
            exit 1
          fi
          echo "Tous les conteneurs sont actifs ✓"

  ########################################################
  # JOB 7 — ROLLBACK SI ECHEC
  ########################################################
  rollback:
    name: Rollback on Failure
    needs: [deploy, health-check, dast-zap, falco-check, verify-containers]
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recreate .env for rollback
        run: |
          # FIX: heredoc sans indentation
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          VIRUSTOTAL_KEY=${{ secrets.VIRUSTOTAL_KEY }}
          GOOGLE_SAFE_BROWSING_KEY=${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
          URLSCAN_API_KEY=${{ secrets.URLSCAN_API_KEY }}
          ZAP_API_KEY=${{ secrets.ZAP_API_KEY }}
          ZAP_BASE_URL=http://zap:8090
          OPENPHISH_ENABLED=true
          PHPMYADMIN_HOST_BINDING=${{ secrets.PHPMYADMIN_HOST_BINDING }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          BACKEND_IMAGE=ghcr.io/${{ github.repository_owner }}/my-backend:latest
          FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/my-frontend:latest
          EOF

      - name: Rollback to previous version
        run: |
          echo "=== ROLLBACK EN COURS ==="

          #  FIX: digests récupérés depuis les outputs du job deploy
          # (plus fiable que /tmp/ sur multi-runners)
          PREV_BACKEND="${{ needs.deploy.outputs.prev_backend }}"
          PREV_FRONTEND="${{ needs.deploy.outputs.prev_frontend }}"

          if [ -z "$PREV_BACKEND" ] || [ -z "$PREV_FRONTEND" ]; then
            echo "Pas de version précédente trouvée — rollback impossible !"
            exit 1
          fi

          docker pull "$PREV_BACKEND"
          docker tag  "$PREV_BACKEND" ghcr.io/${{ github.repository_owner }}/my-backend:latest

          docker pull "$PREV_FRONTEND"
          docker tag  "$PREV_FRONTEND" ghcr.io/${{ github.repository_owner }}/my-frontend:latest

          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d
          sleep 15
          docker ps
          echo "=== ROLLBACK TERMINÉ — version précédente restaurée ==="

      - name: Verify Rollback
        run: |
          sleep 10
          #  FIX: utiliser /health pour une vérification fiable
          if curl -sf http://localhost:8000/health; then
            echo "Backend OK après rollback ✓"
          else
            echo "Backend toujours KO après rollback !"
            exit 1
          fi

  ########################################################
  # JOB 8 — NOTIFICATIONS
  ########################################################
  notify:
    name: Notifications
    needs: [verify-containers, cosign-verify]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify Success
        if: ${{ needs.verify-containers.result == 'success' }}
        run: |
          echo " Déploiement réussi !"
          echo "Backend  : ${{ needs.cosign-verify.outputs.backend_image }}"
          echo "Frontend : ${{ needs.cosign-verify.outputs.frontend_image }}"

      - name: Notify Failure
        if: ${{ needs.verify-containers.result != 'success' }}
        run: |
          echo "Déploiement échoué — vérifiez les logs GitHub Actions !"