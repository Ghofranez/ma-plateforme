name: CD - Deploy App
permissions:
  contents: read
  packages: read
  actions: read

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  ########################################################
  # JOB 0 — NOTIFICATION SI CI ÉCHOUÉ
  ########################################################
  notify-ci-failure:
    name: Notify CI Failure
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: self-hosted
    steps:
      - name: Send Email — CI Failed
        run: |
          curl --ssl-reqd \
            --url 'smtps://smtp.gmail.com:465' \
            --user '${{ secrets.SMTP_EMAIL }}:${{ secrets.SMTP_PASSWORD }}' \
            --mail-from '${{ secrets.SMTP_EMAIL }}' \
            --mail-rcpt '${{ secrets.NOTIFY_EMAIL }}' \
            --upload-file - << 'EOF'
          From: GitHub Actions <${{ secrets.SMTP_EMAIL }}>
          To: ${{ secrets.NOTIFY_EMAIL }}
          Subject: [CI ECHOUE] — Deploiement annule | ${{ github.event.workflow_run.head_branch }}
          Content-Type: text/plain; charset=utf-8

          CI Pipeline Echoue
          Le deploiement a ete annule car le CI n'a pas passe.

          Workflow   : ${{ github.event.workflow_run.name }}
          Branche    : ${{ github.event.workflow_run.head_branch }}
          Commit     : ${{ github.event.workflow_run.head_sha }}
          Declenche  : ${{ github.event.workflow_run.triggering_actor.login }}

          Voir les logs : ${{ github.event.workflow_run.html_url }}
          EOF

  ########################################################
  # JOB 1 — VERIFICATION SIGNATURE COSIGN
  ########################################################
  cosign-verify:
    name: Verify Image Signatures (Cosign)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    outputs:
      backend_image:  ${{ steps.set-images.outputs.backend }}
      frontend_image: ${{ steps.set-images.outputs.frontend }}
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git fetch origin
          git checkout ${{ github.event.workflow_run.head_sha }} 2>/dev/null || \
          git checkout ${{ github.event.workflow_run.head_branch }} 2>/dev/null || true

      - name: Set image names
        id: set-images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest"   >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT

      - name: Login GHCR
        run: |
          echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Verify Backend Image
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "$COSIGN_PUBLIC_KEY" > cosign.pub
          cosign verify --key cosign.pub ${{ steps.set-images.outputs.backend }}
          echo "Image backend verifiee ✓"

      - name: Verify Frontend Image
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "$COSIGN_PUBLIC_KEY" > cosign.pub
          cosign verify --key cosign.pub ${{ steps.set-images.outputs.frontend }}
          echo "Image frontend verifiee ✓"

  ########################################################
  # JOB 2 — DEPLOIEMENT
  ########################################################
  deploy:
    name: Deploy Application
    needs: cosign-verify
    if: success()
    runs-on: self-hosted
    outputs:
      prev_backend:  ${{ steps.save-sha.outputs.prev_backend }}
      prev_frontend: ${{ steps.save-sha.outputs.prev_frontend }}
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git fetch origin
          git checkout ${{ github.event.workflow_run.head_sha }} 2>/dev/null || \
          git checkout ${{ github.event.workflow_run.head_branch }} 2>/dev/null || true

      - name: Save previous SHA for rollback
        id: save-sha
        run: |
          PREV_BACKEND=$(docker inspect \
            ghcr.io/${{ github.repository_owner }}/my-backend:latest \
            --format='{{index .RepoDigests 0}}' 2>/dev/null || echo "")
          PREV_FRONTEND=$(docker inspect \
            ghcr.io/${{ github.repository_owner }}/my-frontend:latest \
            --format='{{index .RepoDigests 0}}' 2>/dev/null || echo "")
          echo "prev_backend=${PREV_BACKEND}"   >> $GITHUB_OUTPUT
          echo "prev_frontend=${PREV_FRONTEND}" >> $GITHUB_OUTPUT
          echo "Version precedente sauvegardee"

      - name: Create .env file
        run: |
          cat > .env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          VIRUSTOTAL_KEY=${{ secrets.VIRUSTOTAL_KEY }}
          GOOGLE_SAFE_BROWSING_KEY=${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
          URLSCAN_API_KEY=${{ secrets.URLSCAN_API_KEY }}
          ZAP_API_KEY=${{ secrets.ZAP_API_KEY }}
          ZAP_BASE_URL=http://zap:8090
          OPENPHISH_ENABLED=true
          PHPMYADMIN_HOST_BINDING=${{ secrets.PHPMYADMIN_HOST_BINDING }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          FRONTEND_HTTPS_PORT=${{ secrets.FRONTEND_HTTPS_PORT }}
          FLOWER_PORT=${{ secrets.FLOWER_PORT }}
          FLOWER_USER=${{ secrets.FLOWER_USER }}
          FLOWER_PASSWORD=${{ secrets.FLOWER_PASSWORD }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          ZAP_PORT=${{ secrets.ZAP_PORT }}
          BACKEND_IMAGE=${{ needs.cosign-verify.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.cosign-verify.outputs.frontend_image }}
          EOF
          echo "=== .env cree (cles masquees) ==="
          cat .env | sed 's/=.*/=***/'

      - name: Login GHCR
        run: |
          echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Pull Images
        run: |
          docker pull ${{ needs.cosign-verify.outputs.backend_image }}
          docker pull ${{ needs.cosign-verify.outputs.frontend_image }}

      - name: Deploy with Docker Compose
        run: |
          echo "=== DEBUT DU DEPLOIEMENT ==="
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d
          echo "=== DEPLOIEMENT TERMINE ==="

      - name: Debug — logs backend
        run: |
          echo "=== STATUS CONTENEURS ==="
          docker ps -a
          echo "=== LOGS BACKEND ==="
          BACKEND_ID=$(docker ps -a --filter "name=backend" -q | head -1)
          [ -n "$BACKEND_ID" ] && docker logs "$BACKEND_ID" --tail 50 || echo "Pas de conteneur backend trouve"
          echo "=== LOGS DB ==="
          DB_ID=$(docker ps -a --filter "name=db" -q | head -1)
          [ -n "$DB_ID" ] && docker logs "$DB_ID" --tail 20 || echo "Pas de conteneur db trouve"

  ########################################################
  # JOB 3 — HEALTH CHECK
  ########################################################
  health-check:
    name: Health Check
    needs: deploy
    if: success()
    runs-on: self-hosted
    steps:
      - name: Health Check Backend
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/; then
              echo "Backend operationnel ✓"
              exit 0
            fi
            echo "Tentative $i/15 — attente 10s..."
            sleep 10
          done
          echo "Backend ne repond pas apres 15 tentatives !"
          exit 1

      - name: Health Check Frontend
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:3000/; then
              echo "Frontend operationnel ✓"
              exit 0
            fi
            echo "Tentative $i/10 — attente 5s..."
            sleep 5
          done
          echo "Frontend ne repond pas apres 10 tentatives !"
          exit 1

      - name: Health Check Worker (Celery)
        run: |
          WORKER=$(docker ps --filter "name=worker" --format "{{.Status}}" | head -1)
          if [[ "$WORKER" != *"Up"* ]]; then
            echo "Worker Celery non actif — verifier les logs !"
            WORKER_ID=$(docker ps --filter "name=worker" -q | head -1)
            [ -n "$WORKER_ID" ] && docker logs "$WORKER_ID" --tail 50
            exit 1
          fi
          echo "Worker Celery operationnel ✓"

      - name: Health Check ZAP (service Compose)
        run: |
          # ZAP a un start_period de 90s + 5 retries*30s = max ~4min
          # On attend qu'il soit vraiment prêt avant le DAST
          echo "Attente de ZAP..."
          for i in {1..20}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:${{ secrets.ZAP_PORT }}/JSON/core/view/version/?apikey=${{ secrets.ZAP_API_KEY }}" \
              || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "ZAP operationnel ✓"
              exit 0
            fi
            echo "Tentative $i/20 — ZAP repond HTTP $HTTP_CODE — attente 15s..."
            sleep 15
          done
          echo "ZAP ne repond pas apres 5 minutes !"
          echo "=== Logs ZAP ==="
          docker logs zap --tail 50 || true
          exit 1

  ########################################################
  # JOB 4 — OWASP ZAP DAST
  ########################################################
  dast-zap:
    name: DAST Scan (OWASP ZAP)
    needs: health-check
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git fetch origin
          git checkout ${{ github.event.workflow_run.head_sha }} 2>/dev/null || \
          git checkout ${{ github.event.workflow_run.head_branch }} 2>/dev/null || true

      - name: Create ZAP Report Directory
        run: |
          mkdir -p ${{ github.workspace }}/zap-report
          chmod 777 ${{ github.workspace }}/zap-report

      - name: Install jq if needed
        run: |
          if ! command -v jq &>/dev/null; then
            echo "Installation de jq..."
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi

      - name: OWASP ZAP Scan via API (service Compose existant)
        env:
          ZAP_API_KEY: ${{ secrets.ZAP_API_KEY }}
          ZAP_PORT:    ${{ secrets.ZAP_PORT }}
        run: |
          set -e
          ZAP_URL="http://localhost:${ZAP_PORT}"
          # Le backend est joignable par ZAP via le réseau Docker "internal"
          TARGET="http://backend:8000"

          echo "=== ZAP URL   : $ZAP_URL ==="
          echo "=== Cible     : $TARGET ==="

          # ── 1. Spider passif ──────────────────────────────────────
          echo "Lancement du spider..."
          SCAN_ID=$(curl -sf \
            "${ZAP_URL}/JSON/spider/action/scan/?apikey=${ZAP_API_KEY}&url=${TARGET}&maxChildren=5&recurse=true" \
            | jq -r '.scan')
          echo "Spider ID : $SCAN_ID"

          # Attente fin du spider (max 5 min)
          for i in {1..30}; do
            PROGRESS=$(curl -sf \
              "${ZAP_URL}/JSON/spider/view/status/?apikey=${ZAP_API_KEY}&scanId=${SCAN_ID}" \
              | jq -r '.status')
            echo "Spider progression : ${PROGRESS}%"
            [ "$PROGRESS" = "100" ] && break
            sleep 10
          done
          echo "Spider termine ✓"

          # ── 2. Scan actif ─────────────────────────────────────────
          echo "Lancement du scan actif..."
          ASCAN_ID=$(curl -sf \
            "${ZAP_URL}/JSON/ascan/action/scan/?apikey=${ZAP_API_KEY}&url=${TARGET}&recurse=true&inScopeOnly=false" \
            | jq -r '.scan')
          echo "Scan actif ID : $ASCAN_ID"

          # Attente fin du scan actif (max 10 min)
          for i in {1..60}; do
            PROGRESS=$(curl -sf \
              "${ZAP_URL}/JSON/ascan/view/status/?apikey=${ZAP_API_KEY}&scanId=${ASCAN_ID}" \
              | jq -r '.status')
            echo "Scan actif progression : ${PROGRESS}%"
            [ "$PROGRESS" = "100" ] && break
            sleep 10
          done
          echo "Scan actif termine ✓"

          # ── 3. Export rapport JSON ────────────────────────────────
          REPORT="${{ github.workspace }}/zap-report/zap-report.json"
          curl -sf \
            "${ZAP_URL}/JSON/core/view/alerts/?apikey=${ZAP_API_KEY}&baseurl=${TARGET}&start=0&count=5000" \
            -o "$REPORT"

          # Export rapport HTML (optionnel, pour archivage)
          curl -sf \
            "${ZAP_URL}/OTHER/core/other/htmlreport/?apikey=${ZAP_API_KEY}" \
            -o "${{ github.workspace }}/zap-report/zap-report.html" || true

          if [ ! -s "$REPORT" ]; then
            echo "Rapport ZAP vide ou absent !"
            exit 1
          fi
          echo "Rapport ZAP genere ✓ ($(wc -c < "$REPORT") bytes)"

      - name: Analyse ZAP Results
        run: |
          REPORT="${{ github.workspace }}/zap-report/zap-report.json"

          echo "Taille du rapport : $(wc -c < "$REPORT") bytes"

          # L'endpoint /JSON/core/view/alerts retourne { "alerts": [...] }
          # riskcode : 3=High, 2=Medium, 1=Low, 0=Informational
          # (ZAP nomme "High" ce que l'ancien rapport appelait "Critical")
          HIGH=$(jq '[.alerts[]? | select(.risk == "High")]   | length' "$REPORT" 2>/dev/null || echo "0")
          MED=$(jq  '[.alerts[]? | select(.risk == "Medium")] | length' "$REPORT" 2>/dev/null || echo "0")
          LOW=$(jq  '[.alerts[]? | select(.risk == "Low")]    | length' "$REPORT" 2>/dev/null || echo "0")
          INFO=$(jq '[.alerts[]? | select(.risk == "Informational")] | length' "$REPORT" 2>/dev/null || echo "0")

          echo "=============================="
          echo "  Resultats ZAP Scan"
          echo "=============================="
          echo "  Haute         : $HIGH"
          echo "  Moyenne       : $MED"
          echo "  Faible        : $LOW"
          echo "  Informations  : $INFO"
          echo "=============================="

          # Afficher le détail des alertes hautes
          if [ "$HIGH" -gt "0" ]; then
            echo "=== Alertes HAUTES ==="
            jq -r '.alerts[] | select(.risk == "High") | "[\(.risk)] \(.name) — \(.url)"' "$REPORT" || true
            echo "ECHEC : $HIGH faille(s) HAUTE(S) detectee(s) !"
            exit 1
          fi

          echo "Aucune faille haute detectee ✓"

      - name: Save ZAP Report locally
        if: always()
        run: |
          DEST="/opt/zap-reports/${{ github.run_id }}"
          mkdir -p "$DEST"
          cp -r ${{ github.workspace }}/zap-report/* "$DEST/" || true
          echo "Rapport ZAP sauvegarde dans $DEST"

  ########################################################
  # JOB 5 — FALCO RUNTIME SECURITY
  ########################################################
  falco-check:
    name: Falco Runtime Security Check
    needs: dast-zap
    if: success()
    runs-on: self-hosted
    steps:
      - name: Check Falco Alerts
        run: |
          echo "Verification des alertes Falco..."
          ALERTS=$(sudo journalctl -u falco --since "5 minutes ago" \
            | grep -i "critical" || true)
          if [ -n "$ALERTS" ]; then
            echo "Falco detecte une menace critique !"
            echo "$ALERTS"
            exit 1
          fi
          echo "Aucune alerte Falco critique ✓"

  ########################################################
  # JOB 6 — VERIFY CONTAINERS
  ########################################################
  verify-containers:
    name: Verify Running Containers
    needs: falco-check
    if: success()
    runs-on: self-hosted
    steps:
      - name: List Running Containers
        run: |
          echo "=== CONTENEURS EN COURS D'EXECUTION ==="
          docker ps
          echo "======================================="

      - name: Check Required Containers
        run: |
          REQUIRED=("db" "redis" "backend" "worker" "frontend" "zap")
          ALL_OK=true

          for SERVICE in "${REQUIRED[@]}"; do
            STATUS=$(docker ps --filter "name=${SERVICE}" \
              --format "{{.Status}}" | head -1)
            if [[ "$STATUS" == *"Up"* ]]; then
              echo "✓ ${SERVICE} : ${STATUS}"
            else
              echo "✗ ${SERVICE} : NON ACTIF"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = false ]; then
            echo "Un ou plusieurs conteneurs critiques sont inactifs !"
            exit 1
          fi
          echo "Tous les conteneurs sont actifs ✓"

  ########################################################
  # JOB 7 — ROLLBACK SI ECHEC
  ########################################################
  rollback:
    name: Rollback on Failure
    needs: [cosign-verify, deploy, health-check, dast-zap, falco-check, verify-containers]
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git fetch origin
          git checkout ${{ github.event.workflow_run.head_sha }} 2>/dev/null || \
          git checkout ${{ github.event.workflow_run.head_branch }} 2>/dev/null || true

      - name: Recreate .env for rollback
        run: |
          cat > .env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          VIRUSTOTAL_KEY=${{ secrets.VIRUSTOTAL_KEY }}
          GOOGLE_SAFE_BROWSING_KEY=${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
          URLSCAN_API_KEY=${{ secrets.URLSCAN_API_KEY }}
          ZAP_API_KEY=${{ secrets.ZAP_API_KEY }}
          ZAP_BASE_URL=http://zap:8090
          OPENPHISH_ENABLED=true
          PHPMYADMIN_HOST_BINDING=${{ secrets.PHPMYADMIN_HOST_BINDING }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          FRONTEND_HTTPS_PORT=${{ secrets.FRONTEND_HTTPS_PORT }}
          FLOWER_PORT=${{ secrets.FLOWER_PORT }}
          FLOWER_USER=${{ secrets.FLOWER_USER }}
          FLOWER_PASSWORD=${{ secrets.FLOWER_PASSWORD }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          ZAP_PORT=${{ secrets.ZAP_PORT }}
          BACKEND_IMAGE=${{ needs.cosign-verify.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.cosign-verify.outputs.frontend_image }}
          EOF

      - name: Rollback to previous version
        run: |
          echo "=== ROLLBACK EN COURS ==="
          PREV_BACKEND="${{ needs.deploy.outputs.prev_backend }}"
          PREV_FRONTEND="${{ needs.deploy.outputs.prev_frontend }}"

          if [ -z "$PREV_BACKEND" ] || [ -z "$PREV_FRONTEND" ]; then
            echo "Pas de version precedente trouvee — rollback impossible !"
            exit 1
          fi

          docker pull "$PREV_BACKEND"
          docker tag  "$PREV_BACKEND" ghcr.io/${{ github.repository_owner }}/my-backend:latest
          docker pull "$PREV_FRONTEND"
          docker tag  "$PREV_FRONTEND" ghcr.io/${{ github.repository_owner }}/my-frontend:latest

          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d
          sleep 15
          docker ps
          echo "=== ROLLBACK TERMINE — version precedente restauree ==="

      - name: Verify Rollback
        run: |
          sleep 10
          if curl -sf http://localhost:8000/health; then
            echo "Backend OK apres rollback ✓"
          else
            echo "Backend toujours KO apres rollback !"
            exit 1
          fi

  ########################################################
  # JOB 8 — NOTIFICATIONS CD
  ########################################################
  notify:
    name: Notifications
    needs: [verify-containers, cosign-verify, deploy]
    runs-on: self-hosted
    if: always() && github.event.workflow_run.conclusion == 'success'
    steps:

      - name: Send Email — Deploiement Reussi
        if: ${{ needs.verify-containers.result == 'success' }}
        run: |
          curl --ssl-reqd \
            --url 'smtps://smtp.gmail.com:465' \
            --user '${{ secrets.SMTP_EMAIL }}:${{ secrets.SMTP_PASSWORD }}' \
            --mail-from '${{ secrets.SMTP_EMAIL }}' \
            --mail-rcpt '${{ secrets.NOTIFY_EMAIL }}' \
            --upload-file - << 'EOF'
          From: GitHub Actions <${{ secrets.SMTP_EMAIL }}>
          To: ${{ secrets.NOTIFY_EMAIL }}
          Subject: [DEPLOIEMENT OK] — ${{ github.event.workflow_run.head_branch }}
          Content-Type: text/plain; charset=utf-8

          Deploiement Reussi !
          L'application a ete deployee avec succes en production.

          Branche      : ${{ github.event.workflow_run.head_branch }}
          Commit       : ${{ github.event.workflow_run.head_sha }}
          Declenche par: ${{ github.actor }}
          Backend      : ${{ needs.cosign-verify.outputs.backend_image }}
          Frontend     : ${{ needs.cosign-verify.outputs.frontend_image }}

          Voir le pipeline : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Send Email — Deploiement Echoue
        if: ${{ needs.verify-containers.result != 'success' }}
        run: |
          curl --ssl-reqd \
            --url 'smtps://smtp.gmail.com:465' \
            --user '${{ secrets.SMTP_EMAIL }}:${{ secrets.SMTP_PASSWORD }}' \
            --mail-from '${{ secrets.SMTP_EMAIL }}' \
            --mail-rcpt '${{ secrets.NOTIFY_EMAIL }}' \
            --upload-file - << 'EOF'
          From: GitHub Actions <${{ secrets.SMTP_EMAIL }}>
          To: ${{ secrets.NOTIFY_EMAIL }}
          Subject: [DEPLOIEMENT ECHOUE] — ${{ github.event.workflow_run.head_branch }}
          Content-Type: text/plain; charset=utf-8

          Deploiement Echoue !
          Une erreur s'est produite durant le pipeline CD. Un rollback a ete tente.

          Branche         : ${{ github.event.workflow_run.head_branch }}
          Commit          : ${{ github.event.workflow_run.head_sha }}
          Declenche par   : ${{ github.actor }}
          cosign-verify   : ${{ needs.cosign-verify.result }}
          deploy          : ${{ needs.deploy.result }}
          verify-containers: ${{ needs.verify-containers.result }}

          Voir les logs : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF