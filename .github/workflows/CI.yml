name: CI Pipeline
permissions:
  contents: read
  security-events: write
  packages: write
  actions: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # ── JOB 1 — SECRET SCAN ──────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2

  # ── JOB 2 — IaC SCAN ─────────────────────────────────────
  iac-scan:
    name: IaC Scan (Checkov)
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: "."
          soft_fail: false
          config_file: ".checkov.yaml"

  # ── JOB 3 — POLICY SCAN ──────────────────────────────────
  policy-scan:
    name: Policy Validation (Conftest)
    needs: iac-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Conftest Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            instrumenta/conftest test \
            -p /project/policy/ \
            --namespace main \
            /project/Backend/dockerfile \
            /project/Frontend/dockerfile

  # ── JOB 4 — BACKEND TESTS ────────────────────────────────
  backend-tests:
    name: Backend Tests
    needs: policy-scan
    runs-on: ubuntu-24.04
    services:
     mysql:
      image: mysql:8
      env:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: test_db
      ports:
        - 3306:3306
      options: >-
        --health-cmd="mysqladmin ping --silent"
        --health-interval=10s
        --health-timeout=5s
        --health-retries=5
     redis:
      image: redis:7-alpine
      ports:
        - 6379:6379
      options: >-
        --health-cmd="redis-cli ping"
        --health-interval=5s
        --health-timeout=3s
        --health-retries=5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      VIRUSTOTAL_KEY:           ${{ secrets.VIRUSTOTAL_KEY }}
      GOOGLE_SAFE_BROWSING_KEY: ${{ secrets.GOOGLE_SAFE_BROWSING_KEY }}
      URLSCAN_API_KEY:          ${{ secrets.URLSCAN_API_KEY }}
      Redis_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          cd Backend
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run Tests
        run: |
          cd Backend
          pytest app/tests/ -v \
            --ignore=app/tests/unit/test_otp.py \
            --cov=app --cov-report=xml:coverage.xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Backend/coverage.xml


  # ── JOB 5 — FRONTEND TESTS ───────────────────────────────
  frontend-tests:
    name: Frontend Tests
    needs: backend-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          cd Frontend
          npm install

      - name: Run Tests
        run: |
          cd Frontend
          npx vitest run --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: Frontend/coverage/lcov.info

  # ── JOB 6 — SONARCLOUD ───────────────────────────────────
  sonarcloud:
    name: SonarCloud Scan
    needs: frontend-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: Backend/
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: Frontend/coverage/
      - uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── JOB 7 — DOCKER BUILD & PUSH ──────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: sonarcloud
    runs-on: ubuntu-24.04
    outputs:
      backend_image: ${{ steps.set_images.outputs.backend }}
      frontend_image: ${{ steps.set_images.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}
      - name: Set image names
        id: set_images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/dockerfile
          push: true
          tags: |
           ${{ steps.set_images.outputs.backend }}
           ghcr.io/${{ github.repository_owner }}/my-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/dockerfile
          push: true
          tags: |
            ${{ steps.set_images.outputs.frontend }}
            ghcr.io/${{ github.repository_owner }}/my-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 8 — SBOM + COSIGN ────────────────────────────────
  sbom-cosign:
    name: SBOM + Cosign
    needs: docker-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ needs.docker-build.outputs.backend_image }}
          format: cyclonedx-json
          output-file: sbom-backend.json
      - uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ needs.docker-build.outputs.frontend_image }}
          format: cyclonedx-json
          output-file: sbom-frontend.json
      - uses: sigstore/cosign-installer@v3
      - name: Sign Images
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign --yes --key env://COSIGN_KEY \
            ${{ needs.docker-build.outputs.backend_image }}
          cosign sign --yes --key env://COSIGN_KEY \
            ${{ needs.docker-build.outputs.frontend_image }}

  # ── JOB 9 — SNYK ─────────────────────────────────────────
  snyk-scan:
    name: Snyk Security Scan
    needs: [sbom-cosign, docker-build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm install

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Pull Images
        run: |
          docker pull ${{ needs.docker-build.outputs.backend_image }}
          docker pull ${{ needs.docker-build.outputs.frontend_image }}

      - name: Snyk Backend
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=Backend/requirements.txt --skip-unresolved

      - name: Snyk Frontend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=Frontend/package.json

      - name: Snyk Container
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ needs.docker-build.outputs.backend_image }}
          args: --file=Backend/dockerfile --severity-threshold=high

  # ── JOB 10 — TRIVY ───────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    needs: [sbom-cosign, docker-build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN}}
      - name: Pull Images
        run: |
          docker pull ${{ needs.docker-build.outputs.backend_image }}
          docker pull ${{ needs.docker-build.outputs.frontend_image }}
      - name: Trivy Code Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Trivy Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build.outputs.backend_image }}
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Trivy Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build.outputs.frontend_image }}
          severity: CRITICAL
          exit-code: 1