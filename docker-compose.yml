# ==============================================================================
# docker-compose.yml — Orchestration complète de l'application
# ==============================================================================
#
# Commandes selon l'environnement :
#   Local  → docker compose --env-file .env up --build
#   Docker → docker compose --env-file .env.docker up --build
#
# Les variables ${...} sont lues depuis le fichier --env-file passé à la commande.
# ==============================================================================

services:

  # ── Base de données MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval:     10s
      timeout:      10s
      retries:      15
      start_period: 30s


  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "${PHPMYADMIN_HOST_BINDING}:80"
    environment:
      PMA_HOST:     db
      PMA_USER:     ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy



  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5


  # ── API Backend (FastAPI / Uvicorn) ───────────────────────────────────────
  backend:
    build: ./Backend
    image: my-backend:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:             mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      SECRET_KEY:               ${SECRET_KEY}
      SMTP_EMAIL:               ${SMTP_EMAIL}
      SMTP_PASSWORD:            ${SMTP_PASSWORD}
      REDIS_URL:                ${REDIS_URL}
      VIRUSTOTAL_KEY:           ${VIRUSTOTAL_KEY}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY}
      URLSCAN_API_KEY:          ${URLSCAN_API_KEY}
      OPENPHISH_ENABLED:        "true"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  # ── Worker Celery ─────────────────────────────────────────────────────────
  worker:
    build: ./Backend
    image: my-backend:latest
    restart: always
    command: >
      celery -A app.application.services.celery_app.celery_app
      worker --loglevel=info --concurrency=2
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL:             mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      SECRET_KEY:               ${SECRET_KEY}
      SMTP_EMAIL:               ${SMTP_EMAIL}
      SMTP_PASSWORD:            ${SMTP_PASSWORD}
      REDIS_URL:                ${REDIS_URL}
      VIRUSTOTAL_KEY:           ${VIRUSTOTAL_KEY}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY}
      URLSCAN_API_KEY:          ${URLSCAN_API_KEY}
      OPENPHISH_ENABLED:        "true"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


# ── Frontend (Vite + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
    image: my-frontend:latest
    restart: always
    ports:
      - "3000:80"
    networks:
      - internal
    depends_on:
      - backend


# ── Réseau interne ────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge   # Réseau bridge isolé : les services se voient entre eux par leur nom


# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  db_data:   # Les données MySQL survivent aux "docker compose down"