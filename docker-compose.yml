# ==============================================================================
# docker-compose.yml — Orchestration complète de l'application
# ==============================================================================

services:

  # ── Base de données MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval:     10s
      timeout:      10s
      retries:      15
      start_period: 30s

  # ── phpMyAdmin ────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "${PHPMYADMIN_HOST_BINDING}:80"
    environment:
      PMA_HOST:     db
      PMA_USER:     ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
    - redis_data:/data
    networks:
      - internal
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

  # ── Backend (FastAPI / Uvicorn) ───────────────────────────────────────────
  backend:
    build: ./Backend
    image: my-backend:latest
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      DATABASE_URL:             mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      SECRET_KEY:               ${SECRET_KEY}
      SMTP_EMAIL:               ${SMTP_EMAIL}
      SMTP_PASSWORD:            ${SMTP_PASSWORD}
      REDIS_URL:                ${REDIS_URL}
      VIRUSTOTAL_KEY:           ${VIRUSTOTAL_KEY}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY}
      URLSCAN_API_KEY:          ${URLSCAN_API_KEY}
      OPENPHISH_ENABLED:        "true"
      ZAP_API_KEY:              ${ZAP_API_KEY}
      ZAP_BASE_URL:             http://zap:8090
      FRONTEND_URL:             ${FRONTEND_URL}
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      zap:
        condition: service_healthy

  # ── Vide la file Celery au démarrage ─────────────────────────────────────
  celery-flush:
    image: redis:7-alpine
    command: redis-cli -h redis flushdb
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ── Worker Celery ─────────────────────────────────────────────────────────
  worker:
    build: ./Backend
    image: my-backend:latest
    restart: always
    command: >
      sh -c "nuclei -update-templates -ud /home/celeryuser/nuclei-templates/ &&
      celery -A app.application.services.celery_app.celery_app
      worker --loglevel=info --concurrency=2 -E"
    volumes:
      - nuclei_templates:/home/celeryuser/nuclei-templates
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL:             mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      SECRET_KEY:               ${SECRET_KEY}
      SMTP_EMAIL:               ${SMTP_EMAIL}
      SMTP_PASSWORD:            ${SMTP_PASSWORD}
      REDIS_URL:                ${REDIS_URL}
      VIRUSTOTAL_KEY:           ${VIRUSTOTAL_KEY}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY}
      URLSCAN_API_KEY:          ${URLSCAN_API_KEY}
      OPENPHISH_ENABLED:        "true"
      ZAP_API_KEY:              ${ZAP_API_KEY}
      ZAP_BASE_URL:             http://zap:8090
      FRONTEND_URL:             ${FRONTEND_URL}
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      zap:
        condition: service_healthy
      celery-flush:
        condition: service_completed_successfully

  # ── Celery Beat (planificateur surveillance) ──────────────────────────────

  beat:
    build: ./Backend
    image: my-backend:latest
    restart: always
    command: >
      celery -A app.application.services.celery_app.celery_app
      beat --loglevel=info
      --schedule=/app/celerybeat-schedule
      --max-interval=30
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL:             mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      SECRET_KEY:               ${SECRET_KEY}
      SMTP_EMAIL:               ${SMTP_EMAIL}
      SMTP_PASSWORD:            ${SMTP_PASSWORD}
      REDIS_URL:                ${REDIS_URL}
      VIRUSTOTAL_KEY:           ${VIRUSTOTAL_KEY}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY}
      URLSCAN_API_KEY:          ${URLSCAN_API_KEY}
      OPENPHISH_ENABLED:        "true"
      ZAP_API_KEY:              ${ZAP_API_KEY}
      ZAP_BASE_URL:             http://zap:8090
      FRONTEND_URL:             ${FRONTEND_URL}
    networks:
      - internal
      - external
    volumes:
      - celerybeat_data:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower (monitoring Celery) ────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: always
    command: >
      celery
      --broker=${REDIS_URL}
      flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "${FLOWER_PORT}:5555"
    environment:
      CELERY_BROKER_URL: ${REDIS_URL}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  # ── Frontend (Vite + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
    image: my-frontend:latest
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./Frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - external
    depends_on:
      backend:
        condition: service_started

  # ── OWASP ZAP ─────────────────────────────────────────────────────────────
  zap:
    image: zaproxy/zap-stable
    container_name: zap
    command: >-
      zap.sh -daemon
      -host 0.0.0.0
      -port 8090
      -config api.key=${ZAP_API_KEY}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config autoupdate.checkOnStart=false
      -config autoupdate.installAddonUpdates=false
      -config autoupdate.checkAddonUpdates=false
      -config autoupdate.downloadNewRelease=false
      -silent
    environment:
      - ZAP_API_KEY=${ZAP_API_KEY}
    ports:
      - "${ZAP_PORT}:8090"
    networks:
      - internal
    restart: unless-stopped
    tmpfs:
      - /zap/wrk:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/?apikey=${ZAP_API_KEY}"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 90s

# ── Réseaux ───────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
    internal: false

# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  db_data:
  nuclei_templates:
  celerybeat_data:
  redis_data: